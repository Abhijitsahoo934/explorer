name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_APP_ENV: production
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_FOUNDER_EMAILS: ${{ secrets.VITE_FOUNDER_EMAILS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify required CI secrets
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Missing required repository secrets: VITE_SUPABASE_URL and/or VITE_SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Generate .env for preflight checks
        run: |
          cat > .env <<EOF
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          VITE_APP_ENV=production
          VITE_FOUNDER_EMAILS=${VITE_FOUNDER_EMAILS:-}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Run strict production preflight
        run: npm run preflight:prod:strict

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: reports/
