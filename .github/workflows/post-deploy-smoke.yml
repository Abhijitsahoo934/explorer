name: Post Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      baseUrl:
        description: "Production or preview URL to smoke test"
        required: false
        type: string

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SMOKE_BASE_URL: ${{ inputs.baseUrl || secrets.PROD_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate target URL
        run: |
          if [ -z "$SMOKE_BASE_URL" ]; then
            echo "Missing target URL. Provide workflow input baseUrl or repository secret PROD_BASE_URL."
            exit 1
          fi

      - name: Run production smoke test
        run: node scripts/smoke-prod.mjs
